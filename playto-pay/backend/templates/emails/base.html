<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #0a0a0a;
            padding-top: 40px;
            padding-bottom: 40px;
        }
        .main {
            background-color: #171717;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            color: #f5f5f5;
            border: 1px solid #262626;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #262626;
        }
        .header h1 {
            margin: 0;
            color: #10b981;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .content {
            padding: 30px;
            line-height: 1.6;
        }
        .content h2 {
            color: #f5f5f5;
            margin-top: 0;
        }
        .footer {
            padding: 20px 30px;
            text-align: center;
            background-color: #0a0a0a;
            color: #a3a3a3;
            font-size: 12px;
            border-top: 1px solid #262626;
        }
        .btn {
            display: inline-block;
            background-color: #10b981;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
        }
        .stat-card {
            background-color: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 6px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #10b981;
            margin: 5px 0 0 0;
        }
        .stat-label {
            color: #a3a3a3;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .details-table td {
            padding: 10px 0;
            border-bottom: 1px solid #262626;
        }
        .details-table td:first-child {
            color: #a3a3a3;
        }
        .details-table td:last-child {
            text-align: right;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main" width="100%">
            <tr>
                <td class="header">
                    <h1>PLAYTO PAY</h1>
                </td>
            </tr>
            <tr>
                <td class="content">
                    {% block content %}{% endblock %}
                </td>
            </tr>
            <tr>
                <td class="footer">
                    &copy; {% now "Y" %} Playto Pay. All rights reserved.<br>
                    Secure Cross-Border Payment Infrastructure.
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
